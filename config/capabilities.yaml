# owner: Clayton
# last_reviewed: 2026-06-19
# source_of_truth_for: Janus brokered-capability registry — one entry per approved downstream tool (Phase-1 seed + Phase-3 writes + full open_brain surface)
# supersedes: null
#
# Janus capability registry — Phase 1 seed (read-only, first-party).
#
# Each capability is ONE downstream tool that Janus may broker. The `summary` is
# the ONLY model-visible description — it is human-reviewed. The untrusted raw
# downstream description is never stored here; only its sha256 hash
# (`raw_description_hash`), populated by the discovery crawler (Phase 2), is
# tracked, so a poisoned third-party descriptor can never reach the model.
#
# `raw_description_hash` / `input_schema_hash` / `last_verified` are intentionally
# unset in this seed — they are filled when Janus first connects and lists tools.

capabilities:
  # --- Open Brain (semantic memory) — read ---------------------------------- #
  open_brain.search_thoughts:
    server_id: open_brain
    downstream_tool_name: search_thoughts
    title: Search Open Brain thoughts
    summary: Semantic search over captured thoughts by meaning.
    risk: read_only
    env_scope: [dev, prod_safe]
    approved: true
    tags: [memory, semantic-search]

  open_brain.list_thoughts:
    server_id: open_brain
    downstream_tool_name: list_thoughts
    title: List Open Brain thoughts
    summary: List recent or filtered captured thoughts.
    risk: read_only
    env_scope: [dev, prod_safe]
    approved: true
    tags: [memory, list]

  open_brain.thought_stats:
    server_id: open_brain
    downstream_tool_name: thought_stats
    title: Open Brain statistics
    summary: Aggregate counts and statistics over captured thoughts.
    risk: read_only
    env_scope: [dev, prod_safe]
    approved: true
    tags: [memory, stats]

  # --- Open Brain — write (Phase 3, behind confirmation) -------------------- #
  # capture_thought sends content to the cloud memory service, so it carries the
  # external_write risk tier (an EXTERNAL_COMM leg of the lethal trifecta) and is
  # flagged requires_confirmation. default_assistant denies it; infra_operator
  # confirms it; the trifecta guard escalates it once the session is tainted.
  open_brain.capture_thought:
    server_id: open_brain
    downstream_tool_name: capture_thought
    title: Capture an Open Brain thought
    summary: Write a new durable thought to semantic memory.
    risk: external_write
    env_scope: [dev, prod_safe]
    approved: true
    requires_confirmation: true
    tags: [memory, write, capture]

  # --- Open Brain — thought mutations (OB1 forgetting tools) ---------------- #
  # update_thought is CONTENT-bearing (new body goes to the cloud memory service)
  # so it carries external_write — the same EXTERNAL_COMM trifecta leg as capture
  # — and is flagged requires_confirmation in this conservative seed. pin/unpin/
  # archive/unarchive are id-only state flips (no content payload) -> local_write.
  # A host overlay (clay_blade) may drop requires_confirmation to make these
  # frictionless under a trusted profile, where the session guard is the control.
  open_brain.update_thought:
    server_id: open_brain
    downstream_tool_name: update_thought
    title: Update an Open Brain thought
    summary: Revise an existing thought's content or metadata by id; creates a revision and can mark it superseded.
    risk: external_write
    env_scope: [dev, prod_safe]
    approved: true
    requires_confirmation: true
    tags: [memory, write, update]

  open_brain.pin_thought:
    server_id: open_brain
    downstream_tool_name: pin_thought
    title: Pin an Open Brain thought
    summary: Exempt a thought from decay downranking and the stale digest (lock its weight).
    risk: local_write
    env_scope: [dev, prod_safe]
    approved: true
    tags: [memory, write, pin]

  open_brain.unpin_thought:
    server_id: open_brain
    downstream_tool_name: unpin_thought
    title: Unpin an Open Brain thought
    summary: Remove a thought's pin so it resumes normal decay.
    risk: local_write
    env_scope: [dev, prod_safe]
    approved: true
    tags: [memory, write, unpin]

  open_brain.archive_thought:
    server_id: open_brain
    downstream_tool_name: archive_thought
    title: Archive an Open Brain thought
    summary: Remove a thought from search results reversibly (the row is kept; unarchive restores it).
    risk: local_write
    env_scope: [dev, prod_safe]
    approved: true
    tags: [memory, write, archive]

  open_brain.unarchive_thought:
    server_id: open_brain
    downstream_tool_name: unarchive_thought
    title: Unarchive an Open Brain thought
    summary: Restore a previously archived thought to search results.
    risk: local_write
    env_scope: [dev, prod_safe]
    approved: true
    tags: [memory, write, unarchive]

  # --- Open Brain — documents (OpenBrain Docs human-readable wiki) ---------- #
  # create/update carry a markdown body to the cloud (external_write, flagged
  # requires_confirmation here); reads are read_only; archive/unarchive are
  # id-only state flips (local_write).
  open_brain.search_documents:
    server_id: open_brain
    downstream_tool_name: search_documents
    title: Search Open Brain documents
    summary: Semantic search over markdown documents in the OpenBrain wiki.
    risk: read_only
    env_scope: [dev, prod_safe]
    approved: true
    tags: [documents, semantic-search]

  open_brain.get_document:
    server_id: open_brain
    downstream_tool_name: get_document
    title: Get an Open Brain document
    summary: Fetch one document's markdown body and metadata by id or slug.
    risk: read_only
    env_scope: [dev, prod_safe]
    approved: true
    tags: [documents, detail]

  open_brain.list_documents:
    server_id: open_brain
    downstream_tool_name: list_documents
    title: List Open Brain documents
    summary: List documents, optionally filtered by folder or tag.
    risk: read_only
    env_scope: [dev, prod_safe]
    approved: true
    tags: [documents, list]

  open_brain.create_document:
    server_id: open_brain
    downstream_tool_name: create_document
    title: Create an Open Brain document
    summary: Create a durable markdown document in the OpenBrain wiki.
    risk: external_write
    env_scope: [dev, prod_safe]
    approved: true
    requires_confirmation: true
    tags: [documents, write, create]

  open_brain.update_document:
    server_id: open_brain
    downstream_tool_name: update_document
    title: Update an Open Brain document
    summary: Revise a document's body or metadata by id or slug; saves a revision.
    risk: external_write
    env_scope: [dev, prod_safe]
    approved: true
    requires_confirmation: true
    tags: [documents, write, update]

  open_brain.archive_document:
    server_id: open_brain
    downstream_tool_name: archive_document
    title: Archive an Open Brain document
    summary: Remove a document from listings and search, reversibly.
    risk: local_write
    env_scope: [dev, prod_safe]
    approved: true
    tags: [documents, write, archive]

  open_brain.unarchive_document:
    server_id: open_brain
    downstream_tool_name: unarchive_document
    title: Unarchive an Open Brain document
    summary: Restore a previously archived document.
    risk: local_write
    env_scope: [dev, prod_safe]
    approved: true
    tags: [documents, write, unarchive]

  # --- Beads (issue tracker) — read ----------------------------------------- #
  beads_readonly.list:
    server_id: beads_readonly
    downstream_tool_name: list_issues
    title: List beads issues
    summary: List issues, optionally filtered by status or priority.
    risk: read_only
    env_scope: [dev, test, prod_safe]
    approved: true
    tags: [issues, list]

  beads_readonly.show:
    server_id: beads_readonly
    downstream_tool_name: show_issue
    title: Show a beads issue
    summary: Show one issue's full details, dependencies, and status.
    risk: read_only
    env_scope: [dev, test, prod_safe]
    approved: true
    tags: [issues, detail]

  beads_readonly.ready:
    server_id: beads_readonly
    downstream_tool_name: list_ready
    title: List ready beads
    summary: List issues that are ready to work (no open blockers).
    risk: read_only
    env_scope: [dev, test, prod_safe]
    approved: true
    tags: [issues, ready]

  beads_readonly.stats:
    server_id: beads_readonly
    downstream_tool_name: stats
    title: Beads statistics
    summary: Aggregate issue counts by status, type, and priority.
    risk: read_only
    env_scope: [dev, test, prod_safe]
    approved: true
    tags: [issues, stats]

  # --- Beads (issue tracker) — write (Phase 3, local_write) ----------------- #
  # Local-write tier: default_assistant confirms, autonomous_agent allows (it is
  # in its allow set), infra_operator allows. Distinct server_id from the
  # read-only surface so the write ceiling is enforced independently.
  beads_operator.create:
    server_id: beads_operator
    downstream_tool_name: create_issue
    title: Create a beads issue
    summary: Open a new issue with title, type, and priority.
    risk: local_write
    env_scope: [dev, test, prod_safe]
    approved: true
    tags: [issues, write, create]

  beads_operator.update:
    server_id: beads_operator
    downstream_tool_name: update_issue
    title: Update a beads issue
    summary: Change an issue's status, priority, or fields.
    risk: local_write
    env_scope: [dev, test, prod_safe]
    approved: true
    tags: [issues, write, update]

  beads_operator.close:
    server_id: beads_operator
    downstream_tool_name: close_issue
    title: Close a beads issue
    summary: Close an issue with a resolution reason.
    risk: local_write
    env_scope: [dev, test, prod_safe]
    approved: true
    tags: [issues, write, close]

  # --- Paperclip (agent platform) — read ------------------------------------ #
  paperclip.list_companies:
    server_id: paperclip
    downstream_tool_name: list_companies
    title: List Paperclip companies
    summary: List companies in the Paperclip workspace.
    risk: read_only
    env_scope: [dev, prod_safe]
    approved: true
    tags: [companies, list]

  paperclip.list_issues:
    server_id: paperclip
    downstream_tool_name: list_issues
    title: List Paperclip issues
    summary: List issues across projects, optionally filtered.
    risk: read_only
    env_scope: [dev, prod_safe]
    approved: true
    tags: [issues, list]

  paperclip.get_dashboard:
    server_id: paperclip
    downstream_tool_name: get_dashboard
    title: Paperclip dashboard
    summary: Fetch the board/dashboard overview for the workspace.
    risk: read_only
    env_scope: [dev, prod_safe]
    approved: true
    tags: [board, dashboard]

  paperclip.health_check:
    server_id: paperclip
    downstream_tool_name: health_check
    title: Paperclip health check
    summary: Liveness/health probe for the Paperclip backend.
    risk: read_only
    env_scope: [dev, prod_safe]
    approved: true
    tags: [health]
